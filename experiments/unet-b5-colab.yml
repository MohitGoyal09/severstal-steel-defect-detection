# Colab-optimized baseline config
# Uses smaller batch size and fewer workers for T4 GPU
short_name: sever-colab
save_dir: saved/
seed: 642
device: 0

arch:
  type: Unet
  args:
    activation: null
    classes: 4
    dropout: 0.1
    encoder_name: efficientnet-b5
    encoder_weights: imagenet
    in_channels: 1
    weight_std: false

augmentation:
  type: HeavyCropTransforms
  args:
    height: 256
    width: 384

data_loader:
  type: SteelSegDataLoader
  args:
    batch_size: 8
    data_dir: /content/data
    nworkers: 2
    shuffle: true
    validation_split: 0.2

loss:
  type: BCEDiceLoss
  args:
    bce_weight: 0.6
    dice_weight: 0.4

lr_scheduler:
  type: CosineAnnealingScheduler
  args:
    n_epochs: 51
    start_anneal: 30

metrics:
  - dice_0
  - dice_1
  - dice_2
  - dice_3
  - dice_mean

optimizer:
  type: RAdam
  args:
    lr: 0.001
    weight_decay: 0.0002
  decoder:
    lr: 0.003
    weight_decay: 0.0003
  encoder:
    lr: 7.0e-05
    weight_decay: 3.0e-05

testing:
  batch_size: 64
  data_dir: /content/data
  nworkers: 2
  verbose: 2

training:
  early_stop: 15
  epochs: 50
  monitor: min val_loss
  save_period: 1
  start_val_epoch: 20
  tensorboard: true
  unfreeze_encoder: 0
  verbose: 2
